apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-app-uat
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: applications
  source:
    repoURL: https://github.com/example-org/platform-engineering
    targetRevision: main
    path: helm/sample-app
    helm:
      releaseName: sample-app
      valueFiles:
        - values.yaml
        - values-uat.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
