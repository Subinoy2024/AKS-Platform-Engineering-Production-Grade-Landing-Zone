trigger:
  branches:
    include: [main]
  paths:
    include:
      - platform-engineering/terraform/*
      - platform-engineering/helm/*
      - platform-engineering/argocd/*

pr:
  branches:
    include: [main]

variables:
  TF_VERSION: '1.7.5'
  TF_WORKING_DIR: 'platform-engineering/terraform'

stages:
  - stage: Validate
    displayName: Validate & Lint
    jobs:
      - job: Validate
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(TF_VERSION)

          - script: terraform fmt -check -recursive
            workingDirectory: $(TF_WORKING_DIR)
            displayName: terraform fmt

          - script: terraform init -backend=false
            workingDirectory: $(TF_WORKING_DIR)
            displayName: terraform init

          - script: terraform validate
            workingDirectory: $(TF_WORKING_DIR)
            displayName: terraform validate

          - script: |
              curl -L https://github.com/terraform-linters/tflint/releases/latest/download/tflint_linux_amd64.zip -o tflint.zip
              unzip tflint.zip && sudo mv tflint /usr/local/bin/
              tflint --recursive
            workingDirectory: $(TF_WORKING_DIR)
            displayName: tflint

          - script: |
              curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
              helm lint platform-engineering/helm/sample-app
            displayName: helm lint

  - stage: Security
    displayName: Security Scans
    dependsOn: Validate
    jobs:
      - job: Security
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              pip install checkov
              checkov -d platform-engineering/terraform --framework terraform
            displayName: checkov

          - script: |
              curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
              tfsec platform-engineering/terraform
            displayName: tfsec

          - script: |
              curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              trivy config platform-engineering --severity HIGH,CRITICAL --exit-code 1
            displayName: trivy config

  - stage: TerraformPlan
    displayName: Terraform Plan
    dependsOn: Security
    jobs:
      - deployment: Plan
        environment: dev
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  inputs:
                    azureSubscription: 'azure-platform-connection'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      cd $(TF_WORKING_DIR)
                      terraform init -backend-config="../environments/dev/backend.hcl"
                      terraform plan -var-file="../environments/dev/terraform.tfvars" -out=tfplan
