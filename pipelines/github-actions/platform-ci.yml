name: Platform CI

on:
  pull_request:
    paths:
      - 'platform-engineering/terraform/**'
      - 'platform-engineering/helm/**'
      - 'platform-engineering/argocd/**'
      - 'platform-engineering/kubernetes/**'
      - '.github/workflows/**'
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

env:
  TF_VERSION: '1.7.5'
  TF_WORKING_DIR: platform-engineering/terraform

jobs:
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform init (no backend)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Helm lint
        uses: azure/setup-helm@v4
      - run: helm lint platform-engineering/helm/sample-app

      - name: kubeconform
        uses: yokawasa/action-setup-kube-tools@v0.11.1
        with:
          kubeconform: '0.6.7'
      - run: |
          helm template sample platform-engineering/helm/sample-app | \
            kubeconform -strict -summary -ignore-missing-schemas

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: platform-engineering/terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: platform-engineering/terraform
          soft_fail: false

      - name: Trivy config
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: platform-engineering
          format: sarif
          output: trivy-config.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
