name: Platform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, uat, prod]
        required: true
      action:
        description: 'Terraform action'
        type: choice
        options: [plan, apply, destroy]
        default: plan

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: '1.7.5'
  TF_WORKING_DIR: platform-engineering/terraform

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} - ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="../environments/${{ inputs.environment }}/backend.hcl"
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          terraform plan \
            -var-file="../environments/${{ inputs.environment }}/terraform.tfvars" \
            -out=tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var-file="../environments/${{ inputs.environment }}/terraform.tfvars"
        working-directory: ${{ env.TF_WORKING_DIR }}

  post-deploy:
    name: Post-deploy validation
    runs-on: ubuntu-latest
    needs: terraform
    if: inputs.action == 'apply'
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group rg-akspf-${{ inputs.environment }}-aks \
            --name aks-akspf-${{ inputs.environment }} \
            --overwrite-existing

      - name: Verify cluster health
        run: |
          kubectl get nodes
          kubectl get pods -A | grep -v Running | grep -v Completed || echo "All pods healthy"

      - name: Verify ArgoCD
        run: |
          kubectl wait --for=condition=available --timeout=300s \
            deployment -l app.kubernetes.io/name=argocd-server -n argocd

      - name: Smoke test sample app
        run: |
          kubectl wait --for=condition=available --timeout=300s \
            deployment/sample-app -n applications || true
          kubectl get ingress -n applications
